id: llm_redteam
name: LLM Red Team
version: 1
summary: LLM-application red team — prompt injection (direct + indirect/RAG), system-prompt exfil, tool-call confused deputy, output-handling sinks, jailbreak, embedding inversion, training-data extraction, cost-DoS
roles:
- researcher
- developer
- executor
modes:
- pentest
- bugbounty
- own-source
- private-source-audit
execution_level: gated
safety_level: active
risk_tier: active
opsec: moderate
tags:
- llm
- prompt-injection
- rag
- agentic
- system-prompt
- jailbreak
- embedding
- output-handling
- markdown-exfil
- cost-dos
- bias-testing
- data-leakage
- divergence
- memory-recall
- structured-taxonomy
- garak-probes
- promptfoo-scenarios
- pyrit-orchestration
requires_scope: true
required_tools:
- garak
optional_tools:
- promptfoo
- pyrit
fallback_chain:
  prompt_probe_battery: [garak, pyrit]
  scenario_eval: [promptfoo]
triggers:
  surfaces:
  - chat_completion_endpoint
  - rag_pipeline
  - vector_store
  - tool_calling_agent
  - file_upload_to_llm
  - email_to_llm
  - browser_to_llm
  - voice_to_llm
  - llm_output_rendered_markdown
  - llm_output_to_iframe_or_html
  - llm_output_used_as_code
  - embedding_endpoint
  - fine_tuning_dataset_endpoint
  identity:
  - end_user_session
  - service_account_for_agent
  - third_party_caller
  prompt_attacks:
  - direct_role_override
  - indirect_via_rag_doc
  - indirect_via_uploaded_file
  - indirect_via_email_thread
  - indirect_via_web_page_in_browser_tool
  - system_prompt_exfil
  - tool_arg_smuggling
  - jailbreak_role_play
  - markdown_link_image_exfil
  output_attacks:
  - rendered_html_xss_via_llm
  - svg_event_handler
  - autorun_javascript_uri
  - data_uri_image_exfil
  data_attacks:
  - training_data_extraction
  - embedding_inversion
  - membership_inference
  abuse:
  - api_cost_dos_unbounded_loop
  - context_window_pump
mode_gates:
  proof:
    minimum:
      - reproducible_prompt_or_payload
      - server_side_evidence_of_acceptance
      - lab_or_test_account_corroboration_for_active_steps
hypothesis_templates:
  - id: llm.indirect_injection_via_rag
    description: Attacker-controlled document indexed into RAG carries instructions that hijack the assistant when the user asks an unrelated question.
  - id: llm.system_prompt_recovery
    description: Through translation, completion, or step-by-step probes, the assistant emits the verbatim or near-verbatim system prompt or tool schema.
  - id: llm.tool_confused_deputy
    description: Untrusted content in the conversation triggers a privileged tool call (email send, file write, payment) without a user-confirmation step.
  - id: llm.output_handling_xss
    description: LLM output containing attacker-supplied markup is rendered without sanitization, achieving XSS in the chat or email surface.
  - id: llm.cost_dos
    description: Crafted prompts induce unbounded reasoning/tool loops or maximum-context generation, amplifying cost or stalling the service.
  - id: llm.markdown_link_exfil
    description: Rendered markdown image/link generated from user data exfiltrates secrets to attacker-controlled URL parameters when the chat client auto-fetches.
forbidden:
- destructive
- dos
- persistence
- out_of_scope
- model_theft
- training_data_dump_at_scale
- targeted_pii_extraction
