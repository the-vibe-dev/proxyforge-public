schema_version: playbook.system
id: playbook.same_host_side_service_mapping
name: Same-Host Side-Service Mapping
version: 1.2.0
status: active
summary: Generic playbook for source/config/runtime hints that a localhost or container-local service may be mapped elsewhere
  on the authorized host, including SSRF-reached internal APIs that need method, parameter, and state/readback closure.
owner:
  team: sechive-core
modes:
  allowed:
  - pentest
  - ctf
  requires_scope: true
objectives:
  primary:
  - correlate_side_service_hints
  - refresh_same_host_inventory_when_allowed
  - validate_read_only_protocol_or_banner
  - complete_internal_api_operation_matrix
  - validate_safe_canary_state_or_readback
  - route_objective_linked_candidate_to_chain
target_requirements:
  surfaces:
    any:
    - surface.network.same_host
    - surface.web.http
required_skills:
  primary:
  - recon_advisor
  - poc_validator
  - scope_guard
  supporting:
  - api_security
  - exploit_chainer
  - web_hunter
  - payload_crafter
  - report_generator
  - evidence_ledger
theory_filters:
  preferred_theories:
  - network.same_host_side_service_mapping
proof_continuation:
  enabled: true
  max_replans: 2
  route_thin_fallback: true
  require_candidate_closure: true
global_limits:
  max_steps: 28
  max_runtime_minutes: 40
steps:
- id: scope.preflight
  title: Confirm authorization, target boundaries, and allowed proof depth
  agent: orchestrator
  action_type: policy_check
  skill_ref: scope_guard
  inputs_from:
  - run.scope
  - run.target_profile
  - program.policy
  evidence_gate:
    id: gate.scope.preflight
    required:
    - type: scope_record
      count: 1
    - type: roe_matrix
      count: 1
    blocked_when:
    - target_out_of_scope
    - destructive_action_required
    - unauthorized_third_party
- id: hints.correlate
  title: Correlate localhost/source/config/service hints with current host inventory
  agent: researcher
  action_type: analysis
  skill_ref: recon_advisor
  evidence_gate:
    id: gate.side_service.hints
    required:
    - type: side_service_hint_map
      count: 1
- id: inventory.refresh
  title: Run one scoped same-host inventory only if the current inventory is shallow and scope allows it
  agent: recon
  action_type: scanner_run
  skill_ref: recon_advisor
  inputs_from:
  - hints.correlate
  when: inventory_shallow_and_host_scope_allows
  evidence_gate:
    id: gate.side_service.inventory
    required_any:
    - type: same_host_port_inventory
      count: 1
    - type: scope_blocked_note
      count: 1
- id: candidate.validate
  title: Validate plausible mapped candidates with read-only banner/protocol proof
  agent: validator
  action_type: evidence_validation
  skill_ref: poc_validator
  inputs_from:
  - hints.correlate
  - inventory.refresh
  evidence_gate:
    id: gate.side_service.validation
    required_any:
    - type: read_only_side_service_proof
      count: 1
    - type: mapped_port_negative_evidence
      count: 1
    blocked_when:
    - out_of_scope_host
    - active_bruteforce_required
    - service_disruption_risk
- id: internal_api.matrix
  title: When the side service exposes API docs, errors, or operation routes, build the method/content-type/parameter matrix
  agent: validator
  action_type: evidence_validation
  skill_ref: api_security
  inputs_from:
  - candidate.validate
  when: ssrf_or_side_service_returns_internal_api_docs_errors_or_route_names
  evidence_gate:
    id: gate.side_service.internal_api_matrix
    required_any:
    - type: internal_api_operation_matrix
      count: 1
    - type: no_internal_operations_note
      count: 1
    blocked_when:
    - out_of_scope_host
    - service_disruption_risk
- id: internal_api.canary
  title: Complete one safe internal operation with canary readback and cleanup when the operation is stateful and policy allows
    it
  agent: executor
  action_type: evidence_validation
  skill_ref: poc_validator
  inputs_from:
  - internal_api.matrix
  when: internal_operation_accepts_bounded_state_or_readback
  evidence_gate:
    id: gate.side_service.internal_api_canary
    required_any:
    - type: canary_state_readback_and_cleanup
      count: 1
    - type: read_only_internal_data_proof
      count: 1
    - type: internal_operation_negative_evidence
      count: 1
    blocked_when:
    - out_of_scope_host
    - unbounded_state_change
    - dos_risk
    - cleanup_not_possible
- id: chain.objective
  title: Chain only objective-linked side-service capabilities
  agent: planner
  action_type: analysis
  skill_ref: exploit_chainer
  inputs_from:
  - candidate.validate
  - internal_api.matrix
  - internal_api.canary
  evidence_gate:
    id: gate.side_service.objective_link
    required:
    - type: objective_link_or_cap_note
      count: 1
- id: agent.runtime.closeout
  title: Promote final evidence through agent handoff, redaction, and proof-readiness checks
  agent: evaluator
  action_type: agent_runtime_closeout
  skill_ref: evidence_ledger
  inputs_from:
  - chain.objective
  - decision_log
  - coverage_matrix
  evidence_gate:
    id: gate.agent.runtime.closeout
    required_any:
    - type: proof_pack
      count: 1
    - type: closure_note
      count: 1
    - type: negative_evidence_summary
      count: 1
    required:
    - type: redaction_log
      count: 1
    - type: agent_handoff_trace
      count: 1
    quality_floor: 0.75
    blocked_when:
    - unredacted_secret
    - missing_scope_ref
    - unresolved_safety_decision
agents:
  orchestrator:
    role: planner
    responsibilities:
    - select_playbooks
    - maintain_scope_state
    - coordinate_handoffs
    - prioritize_by_signal
    handoff_artifacts:
    - run_plan
    - scope_ref
    - coverage_matrix
    - open_risks
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  planner:
    role: planner
    responsibilities:
    - define_objective
    - choose_safe_proof_depth
    - map_dependencies
    - set_stop_conditions
    handoff_artifacts:
    - validation_plan
    - roe_matrix
    - candidate_queue
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  researcher:
    role: researcher
    responsibilities:
    - map_surface
    - generate_hypotheses
    - rank_theories
    - record_negative_evidence
    handoff_artifacts:
    - observation_bundle
    - theory_frontier
    - asset_graph_delta
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  recon:
    role: researcher
    responsibilities:
    - refresh_inventory
    - correlate_external_signals
    - flag_scope_ambiguity
    handoff_artifacts:
    - asset_graph_delta
    - service_inventory
    - scope_question
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  executor:
    role: executor
    responsibilities:
    - run_bounded_tests
    - capture_raw_evidence
    - honor_rate_limits
    - abort_on_guardrail
    handoff_artifacts:
    - http_exchange
    - tool_result
    - runtime_observation
    - blocked_record
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  developer:
    role: builder
    responsibilities:
    - build_harnesses
    - prepare_test_fixtures
    - instrument_targets
    - avoid_weaponization
    handoff_artifacts:
    - harness_manifest
    - build_log
    - fixture_manifest
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  analyst:
    role: analyst
    responsibilities:
    - triage_results
    - deduplicate_findings
    - reason_about_root_cause
    - score_exploitability_defensively
    handoff_artifacts:
    - triage_record
    - root_cause_hypothesis
    - diff_signal
    - risk_score
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  validator:
    role: validator
    responsibilities:
    - validate_replay
    - minimize_proof
    - verify_false_positive_filters
    - confirm_cleanup
    handoff_artifacts:
    - validation_result
    - replay_spec
    - cleanup_log
    - negative_evidence
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  evaluator:
    role: evaluator
    responsibilities:
    - review_evidence_quality
    - enforce_policy
    - decide_submission_readiness
    - route_gaps
    handoff_artifacts:
    - readiness_decision
    - risk_decision
    - gap_list
    - quality_score
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  reporter:
    role: reporter
    responsibilities:
    - assemble_proof_pack
    - redact_sensitive_data
    - write_disclosure
    - preserve_replay_steps
    handoff_artifacts:
    - proof_pack
    - report
    - timeline
    - remediation_notes
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  specialist:
    role: domain_specialist
    responsibilities:
    - apply_domain_methods
    - flag_domain_specific_risks
    - produce_specialist_handoff
    handoff_artifacts:
    - specialist_notes
    - domain_matrix
    - candidate_findings
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
  safety_reviewer:
    role: safety_reviewer
    responsibilities:
    - enforce_authorization
    - block_destructive_actions
    - review_sensitive_evidence
    - confirm_nonproduction_proof
    handoff_artifacts:
    - safety_decision
    - redaction_log
    - stop_condition_note
    guardrails:
    - use_least_privilege_tools
    - preserve_evidence_refs
    - do_not_cross_scope
    - stop_on_destructive_or_persistence_request
contract_lineage:
  system: sechive-unified-playbook
  posture: unified
  preserves:
  - existing_domain_objectives
  - existing_evidence_gates
  - authorized_testing_scope
  adds:
  - agent_runtime_contract
  - standard_agent_roster
  - scope_roe_preflight
  - safe_proof_depth
  - redacted_evidence_ledger_closeout
agent_runtime:
  orchestration: planner_researcher_executor_validator_reporter_with_safety_review
  routing_rules:
  - start_with_scope_and_roe_gate
  - route_passive_recon_before_active_testing
  - require_validator_before_report_promotion
  - send_scope_ambiguity_to_safety_reviewer
  - prefer_minimal_benign_proof_over_broad_exploitation
  handoff_contract:
    required_fields:
    - objective
    - scope_ref
    - assumptions
    - evidence_refs
    - risk_level
    - next_action
    - stop_conditions
    evidence_ref_format: ledger://<artifact-type>/<stable-id>
    handoff_requires_redaction_check: true
  memory_policy:
    write_to:
    - evidence_ledger
    - coverage_matrix
    - decision_log
    never_store_raw_values:
    - passwords
    - session_tokens
    - api_keys
    - private_keys
    - third_party_personal_data
    secret_representation: type+issuer+last4+hash_prefix_when_allowed
  parallelization:
    allowed_for:
    - passive_enrichment
    - static_analysis
    - documentation_review
    - negative_evidence_collection
    requires_join_gate: gate.agent.join_quality
  quality_bars:
    minimum_replayability: 0.75
    minimum_scope_confidence: 0.95
    require_negative_evidence_for_closed_branches: true
    require_cleanup_note_for_stateful_tests: true
  high_risk_review_required: false
safety_model:
  authorization:
    requires_scope_record: true
    requires_roe_matrix: true
    block_when:
    - target_out_of_scope
    - unclear_asset_ownership
    - third_party_impact
    - policy_blocked
  proof_depth:
    default: minimal_benign_reproduction
    production: no_destructive_actions_no_persistence_no_real_data_exfiltration
    ctf_or_lab: full_local_validation_allowed_without_third_party_targets
    high_risk_requires_explicit_roe: false
  traffic_controls:
    respect_rate_limits: true
    backoff_on_errors: true
    no_broad_scanning_without_active_scan_permission: true
    log_user_agent_or_test_marker_when_required: true
  data_handling:
    collect_minimum_data: true
    redact_sensitive_values: true
    use_test_accounts_and_canaries: true
    forbid_bulk_access_or_dumping: true
  stop_conditions:
  - destructive_effect_detected
  - privilege_boundary_crossed_beyond_roe
  - real_user_data_would_be_accessed
  - service_health_degrades
  - persistence_or_evasion_required_outside_lab
evidence_contracts:
  ledger_required: true
  minimum_artifacts:
  - scope_record
  - observation_bundle_or_negative_evidence
  - validation_result_or_blocked_record
  - proof_pack_or_closure_note
  redaction:
    required_for:
    - credentials
    - tokens
    - cookies
    - customer_data
    - internal_hostnames_when_policy_requires
    preserve:
    - timestamps
    - request_ids
    - status_codes
    - owned_test_account_ids
    - hash_prefixes_when_allowed
  proof_pack:
    required_sections:
    - scope
    - impact
    - reproduction
    - evidence
    - false_positive_checks
    - cleanup
    - remediation
    replay_must_use:
    - owned_test_account_or_lab_target
    - bounded_payload
    - rate_limit_notes
