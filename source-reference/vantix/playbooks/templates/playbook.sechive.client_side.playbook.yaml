schema_version: playbook.system
id: playbook.sechive.client_side
name: SecHive Client-Side Matrix (WSTG 4.11)
version: 1.0.0
status: active
summary: "Clickjacking framing test, postMessage audit, browser storage scan, XSSI prefix audit, reverse tabnabbing, HTML/CSS/CSTI injection, WebSocket CSWSH."
owner:
  team: sechive-core
modes:
  allowed: [bugbounty, pentest, ctf]
  requires_scope: true
objectives:
  primary: [run_sechive_wstg_aligned_category_battery]
target_requirements:
  surfaces:
    any: [surface.web.http, surface.api.rest]
required_skills:
  primary: [scope_guard]
  supporting: []
global_limits:
  max_steps: 30
  max_runtime_minutes: 60
steps:
- id: scope.preflight
  title: Confirm authorization + scope before running probe battery
  agent: orchestrator
  action_type: policy_check
  skill_ref: scope_guard
  evidence_gate:
    id: gate.scope.preflight
    required: [{type: scope_record, count: 1}]
- id: sechive.battery
  title: Run the SecHive WSTG-aligned probe battery for this category
  agent: executor
  action_type: deterministic_probe
  skill_ref: scope_guard
  evidence_gate:
    id: gate.sechive.battery
    required: [{type: sechive_test_result, count: 1}]

# H19 — SecHive executable_steps block. PlaybookExecutor walks each entry,
# dynamic-imports the primitive, binds (client, base, summary, routes,
# observed_tokens) by signature, and persists hits as
# Fact(source="playbook-execute", tags=[wstg:..., sechive:...]).
executable_steps:
  - playbook_step_id: sechive.client.clickjacking
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_clickjacking_frame_test
    sechive_id: sechive.client.clickjacking
    wstg_id: WSTG-CLIENT-09
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.web_messaging
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_postmessage_listener_audit
    sechive_id: sechive.client.web_messaging
    wstg_id: WSTG-CLIENT-11
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.xssi
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_xssi_inclusion
    sechive_id: sechive.client.xssi
    wstg_id: WSTG-CLIENT-13
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.reverse_tabnabbing
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_reverse_tabnabbing
    sechive_id: sechive.client.reverse_tabnabbing
    wstg_id: WSTG-CLIENT-14
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.websocket_cswsh
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_websocket_cswsh
    sechive_id: sechive.client.websocket_cswsh
    wstg_id: WSTG-CLIENT-10
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.html_injection
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_html_injection
    sechive_id: sechive.client.html_injection
    wstg_id: WSTG-CLIENT-03
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.css_injection
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_css_injection
    sechive_id: sechive.client.css_injection
    wstg_id: WSTG-CLIENT-05
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.browser_storage
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_browser_storage_scan
    sechive_id: sechive.client.browser_storage
    wstg_id: WSTG-CLIENT-12
    evidence_emit: { kind: sechive_test_result }
  - playbook_step_id: sechive.client.template_injection
    primitive_module: secops.services.probe_client_side
    primitive_function: probe_clientside_template_injection
    sechive_id: sechive.client.template_injection
    wstg_id: WSTG-CLIENT-15
    evidence_emit: { kind: sechive_test_result }
