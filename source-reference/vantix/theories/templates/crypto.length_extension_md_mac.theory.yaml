schema_version: theory.system
id: crypto.length_extension_md_mac
title: Length-extension forgery against H(secret || message) MACs (MD5/SHA1/SHA256/SHA512)
version: 1.0.0
status: active
summary: A MAC computed as `H(secret || message)` over a Merkle–Damgård hash (MD5, SHA1, SHA256, SHA512) is vulnerable to length-extension. Given a valid `(message, mac)` pair and the secret length, an attacker forges `H(secret || message || padding || appended_data)` without knowing the secret.
vuln_class: crypto
subclass: length_extension
severity_default: high
mappings:
  cwe: [CWE-345, CWE-327]
applicability:
  target_surfaces: [surface.web.http, surface.api.rest]
preconditions:
  required: [mac_uses_hash_concat_secret_then_message, hash_is_md_construction, original_message_and_mac_observable]
detection_logic:
  predicates:
    - hashpump_forged_mac_accepted_by_endpoint
    - hash_construction_visible_in_source_or_inferable
  disconfirming_observations:
    - mac_uses_hmac_construction
    - mac_uses_keccak_or_blake_family
    - server_revalidates_message_structure_independently
exploitability_model:
  factors: [secret_length_known_or_brute_forceable, message_format_strict_or_loose]
impact_model:
  dimensions: [forgery, authz_bypass, command_injection_via_appended_params]
evidence_requirements:
  minimum_for_validated:
    - type: original_pair_evidence
      count: 1
    - type: forged_pair_accepted_evidence
      count: 1
false_positive_filters:
  required:
    - verify_mac_actually_concat_construction_not_hmac
    - verify_appended_data_is_meaningful_to_app
linked_skills:
  primary: [crypto_attacker]
  supporting: [poc_validator]
linked_playbooks:
  primary: [playbook.crypto_token_review]
