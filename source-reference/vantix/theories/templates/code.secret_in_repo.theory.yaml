schema_version: theory.system
id: code.secret_in_repo
title: Secret material committed to source repository
version: 1.0.0
status: active
summary: A credential, key, token, or other secret is present in tracked source, including current files, prior git history, build artifacts, IaC, or container layers. Validity (currently active vs. rotated) governs severity.
vuln_class: secret_disclosure
subclass: in_repository
severity_default: high
mappings:
  owasp_top10_2025: [A07]
  cwe: [CWE-798, CWE-540, CWE-200]
applicability:
  target_surfaces: [surface.source.code, surface.source.git_history, surface.source.container_image]
preconditions:
  required: [source_or_history_disclosure_authorized]
detection_logic:
  predicates:
    - matches_provider_specific_pattern_or_high_entropy_with_context
    - not_an_obvious_test_or_example_value
  disconfirming_observations:
    - documented_test_fixture_in_test_path
    - placeholder_or_template_marker
    - already_rotated_per_provider_audit_log
exploitability_model:
  factors: [secret_validity, scope_of_credential, exposure_blast_radius, rotation_status]
impact_model:
  dimensions: [account_takeover, data_access, lateral_movement, financial_cost]
evidence_requirements:
  minimum_for_validated:
    - type: file_path_with_line
      count: 1
    - type: secret_pattern_identification
      count: 1
    - type: commit_or_layer_locator
      count: 1
  preferred_for_critical:
    - type: validity_check_offline_or_authorized
      count: 1
false_positive_filters:
  required:
    - verify_not_known_test_fixture
    - verify_not_documentation_placeholder
    - verify_offline_match_before_any_network_probe
    - verify_authorization_before_validating_against_live_service
linked_skills:
  primary: [source_reviewer]
  supporting: [credential_tester, threat_modeler]
linked_playbooks:
  primary: [playbook.source_audit_loop]
