schema_version: theory.system
id: supply_chain.docker_image_layer_secret
title: Docker image retains build-time secret in an intermediate layer
version: 1.0.0
status: active
summary: A Dockerfile COPYs or ARGs a secret (private key, registry token, cloud credential) into an intermediate layer and later deletes or overrides it. Because deletions create new layers without removing data from earlier ones, the secret remains retrievable by anyone who can pull the image.
vuln_class: supply_chain
subclass: image_layer_secret
severity_default: high
mappings:
  cwe: [CWE-538, CWE-200]
  ecosystem: [docker, oci]
applicability:
  target_surfaces: [surface.cicd.pipeline, surface.code.dependencies]
preconditions:
  required: [dockerfile_introduces_secret_via_copy_or_arg, image_published_to_accessible_registry]
detection_logic:
  predicates:
    - dive_or_history_shows_secret_blob_in_intermediate_layer
    - dockerfile_copy_followed_by_rm_pattern_present
    - build_args_pass_secret_without_buildkit_secret_mount
  disconfirming_observations:
    - dockerfile_uses_buildkit_secret_mount
    - multi_stage_build_with_artifact_only_copy
    - registry_image_squashed_with_secret_purged
exploitability_model:
  factors: [registry_visibility, image_layer_count, secret_value_lifecycle]
impact_model:
  dimensions: [credential_theft, downstream_account_compromise]
evidence_requirements:
  minimum_for_validated:
    - type: dockerfile_evidence
      count: 1
    - type: image_layer_inspection_evidence
      count: 1
  preferred_for_critical:
    - type: secret_extraction_demo
      count: 1
false_positive_filters:
  required:
    - verify_secret_actually_in_layer
    - verify_image_published_or_accessible
    - verify_secret_still_valid_or_recently_rotated
linked_skills:
  primary: [cicd_redteam, source_reviewer]
  supporting: [poc_validator]
linked_playbooks:
  primary: [playbook.cicd_pipeline_attack_paths]
