schema_version: theory.system
id: auth.credential_material_disclosure
title: Credential material disclosure requiring bounded validation
version: 1.0.0
status: active
summary: Hashes, tokens, reset artifacts, API keys, cookies, or deterministic credentials are exposed by the target. Impact depends on actor linkage, freshness, scope, and whether a bounded owned-context or service-specific validation proves usability.
vuln_class: auth
subclass: credential_material_disclosure
severity_default: medium
mappings:
  cwe: [CWE-522, CWE-200, CWE-798]
applicability:
  target_surfaces: [surface.identity, surface.web.http, surface.api.http]
preconditions:
  required: [credential_like_material_exposed]
detection_logic:
  predicates:
    - material_has_hash_token_or_secret_structure
    - material_is_linked_to_user_service_or_privilege_context
    - bounded_validation_or_redacted_exposure_proves_security_impact
  disconfirming_observations:
    - material_is_documentation_sample_or_honeypot
    - material_is_expired_unlinked_or_inert
    - validation_would_require_spraying_or_lockout_risk
impact_model:
  dimensions: [secret_exposure, session_access, account_access, downstream_service_access]
evidence_requirements:
  minimum_for_validated:
    - type: credential_material_classification
      count: 1
    - type: redacted_exposure_proof
      count: 1
  preferred_for_high:
    - type: owned_context_auth_delta
      count: 1
false_positive_filters:
  required:
    - redact_raw_secret_values
    - separate_exposure_from_usability
    - prohibit_password_spraying_as_validation
linked_skills:
  primary: [credential_tester]
  supporting: [exploit_chainer, poc_validator]
linked_playbooks:
  primary: [playbook.credential_material_strategy]
